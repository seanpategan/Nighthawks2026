<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0a0a; color: #eee; font-family: sans-serif; height: 100vh; display: flex; padding: 14px; gap: 12px; overflow: hidden; }

#sidebar { width: 200px; flex-shrink: 0; background: #141414; border-radius: 14px; border: 1px solid #222; padding: 16px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
.section-label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: .1em; margin-bottom: 6px; }
.stat-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #1e1e1e; font-size: 12px; }
.stat-row span:first-child { color: #888; }
.stat-row span:last-child { font-weight: bold; }
.total span:last-child { color: #fff; font-size: 13px; }
.density span:last-child { color: #6af; }
.divider { height: 1px; background: #1e1e1e; }
#note { font-size: 10px; color: #7c7c7c; line-height: 1.6; margin-top: auto; }

#cameras { flex: 1; display: flex; flex-wrap: wrap; align-content: center; justify-content: center; gap: 16px; overflow-y: auto; padding: 10px; }
fieldset { flex: 1 1 45%; min-width: 320px; max-width: 642px; background: #141414; border-radius: 6px; border: 1px solid #333; height: fit-content; margin-top: 10px; }
legend { margin-left: 12px; padding: 0 8px; font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .12em; color: #aaa; }
.cam-frame { display: flex; justify-content: center; padding: 14px; }
.cam-frame img { width: 100%; max-width: 640px; height: auto; display: block; border-radius: 4px; }
</style>
</head>
<body>
<div id="sidebar">
    <div>
        <div class="section-label">Inbound → Manhattan</div>
        <div class="stat-row"><span>Cars</span><span id="in-cars">—</span></div>
        <div class="stat-row"><span>Trucks</span><span id="in-trucks">—</span></div>
        <div class="stat-row"><span>Buses</span><span id="in-buses">—</span></div>
        <div class="stat-row"><span>Motorcycles</span><span id="in-motorcycles">—</span></div>
        <div class="stat-row total"><span>Total</span><span id="in-total">—</span></div>
        <div class="stat-row density"><span>Density</span><span id="in-rank">—</span></div>
    </div>
    <div class="divider"></div>
    <div>
        <div class="section-label">Outbound ← Brooklyn</div>
        <div class="stat-row"><span>Cars</span><span id="out-cars">—</span></div>
        <div class="stat-row"><span>Trucks</span><span id="out-trucks">—</span></div>
        <div class="stat-row"><span>Buses</span><span id="out-buses">—</span></div>
        <div class="stat-row"><span>Motorcycles</span><span id="out-motorcycles">—</span></div>
        <div class="stat-row total"><span>Total</span><span id="out-total">—</span></div>
        <div class="stat-row density"><span>Density</span><span id="out-rank">—</span></div>
    </div>
    <div id="note">Density is relative to the last 20 frames (~200s)<br><br>Updated: <span id="timestamp">—</span></div>
</div>

<div id="cameras">
    <fieldset>
        <legend>Inbound feed</legend>
        <div class="cam-frame"><img id="frame-inbound" src="latest_frame_inbound.jpg" alt=""></div>
    </fieldset>
    <fieldset>
        <legend>Outbound feed</legend>
        <div class="cam-frame"><img id="frame-outbound" src="latest_frame_outbound.jpg" alt=""></div>
    </fieldset>
</div>

<script>
function refresh() {
    const t = Date.now();
    document.getElementById("frame-inbound").src  = "latest_frame_inbound.jpg?t="  + t;
    document.getElementById("frame-outbound").src = "latest_frame_outbound.jpg?t=" + t;
    fetch("latest_stats.json?t=" + t).then(r => r.json()).then(d => {
        if (d.timestamp) document.getElementById("timestamp").textContent = d.timestamp;
        if (d.inbound) {
            document.getElementById("in-cars").textContent        = d.inbound.cars;
            document.getElementById("in-trucks").textContent      = d.inbound.trucks;
            document.getElementById("in-buses").textContent       = d.inbound.buses;
            document.getElementById("in-motorcycles").textContent = d.inbound.motorcycles;
            document.getElementById("in-total").textContent       = d.inbound.total;
            document.getElementById("in-rank").textContent        = d.inbound.rank + " / 10";
        }
        if (d.outbound) {
            document.getElementById("out-cars").textContent        = d.outbound.cars;
            document.getElementById("out-trucks").textContent      = d.outbound.trucks;
            document.getElementById("out-buses").textContent       = d.outbound.buses;
            document.getElementById("out-motorcycles").textContent = d.outbound.motorcycles;
            document.getElementById("out-total").textContent       = d.outbound.total;
            document.getElementById("out-rank").textContent        = d.outbound.rank + " / 10";
        }
    }).catch(() => {});
}
refresh();
setInterval(refresh, 10000);
</script>
</body>
</html>
